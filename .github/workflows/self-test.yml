name: Self-test (dogfood)

# Run dochealer on its own PRs using the FREE GitHub Models tier:
# the built-in GITHUB_TOKEN works as the LLM API key when the job has
# `models: read` permission. No paid key, no secrets to configure.
on:
  pull_request:
    paths: ["src/**/*.py"]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  dochealer:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'dochealer/') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          llm-api-key: ${{ github.token }}
          llm-provider: "github"
          llm-model: "openai/gpt-4o-mini"  # low tier: 15 req/min vs gpt-4o's 10
          docs-path: "docs"
          mode: "flag-only"
